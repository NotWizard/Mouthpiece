name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers on version tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write # Required for creating releases

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ inputs.version }}"
            RELEASE_VERSION="${RAW_VERSION#v}"
            RELEASE_TAG="v${RELEASE_VERSION}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_VERSION="${RELEASE_TAG#v}"
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Validate release version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "${{ needs.prepare.outputs.release_version }}" ]; then
            echo "Expected package.json version ${{ needs.prepare.outputs.release_version }}, found $PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate ASR replay benchmark summary
        run: npm run replay:asr -- --output tmp/asr-replay.json

      - name: Verify ASR replay benchmark summary
        run: npm run verify:asr-benchmarks

      - name: Cache native binaries
        uses: actions/cache@v4
        with:
          path: resources/bin
          key: linux-x64-bin-${{ hashFiles('scripts/download-*.js') }}

      - name: Download whisper.cpp binaries
        run: node scripts/download-whisper-cpp.js --current
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download llama-server binaries
        run: node scripts/download-llama-server.js --current
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download sherpa-onnx binaries
        run: node scripts/download-sherpa-onnx.js --current
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: linux-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: linux-electron-

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm pkg-config libx11-dev libxtst-dev libatspi2.0-dev libglib2.0-dev

      - name: Build Application
        run: npm run build:linux -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL }}
          VITE_OPENWHISPR_API_URL: ${{ vars.VITE_OPENWHISPR_API_URL }}
          VITE_OPENWHISPR_OAUTH_CALLBACK_URL: ${{ vars.VITE_OPENWHISPR_OAUTH_CALLBACK_URL }}

      - name: Upload Linux update metadata
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          test -f dist/latest-linux.yml
          gh release upload "${{ needs.prepare.outputs.release_tag }}" dist/latest-linux.yml --clobber

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Validate release version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "${{ needs.prepare.outputs.release_version }}" ]; then
            echo "Expected package.json version ${{ needs.prepare.outputs.release_version }}, found $PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate ASR replay benchmark summary
        run: npm run replay:asr -- --output tmp/asr-replay.json

      - name: Verify ASR replay benchmark summary
        run: npm run verify:asr-benchmarks

      - name: Cache native binaries
        uses: actions/cache@v4
        with:
          path: resources/bin
          key: windows-x64-bin-${{ hashFiles('scripts/download-*.js') }}

      - name: Download whisper.cpp binaries
        run: node scripts/download-whisper-cpp.js --current
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download llama-server binaries
        run: node scripts/download-llama-server.js --current
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download sherpa-onnx binaries
        run: node scripts/download-sherpa-onnx.js --current
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download nircmd.exe
        run: node scripts/download-nircmd.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download windows-fast-paste.exe
        run: node scripts/download-windows-fast-paste.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download windows-key-listener.exe
        run: node scripts/download-windows-key-listener.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron/Cache
          key: windows-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: windows-electron-

      - name: Build Application
        run: npm run build:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL }}
          VITE_OPENWHISPR_API_URL: ${{ vars.VITE_OPENWHISPR_API_URL }}
          VITE_OPENWHISPR_OAUTH_CALLBACK_URL: ${{ vars.VITE_OPENWHISPR_OAUTH_CALLBACK_URL }}

  build-macos:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_SIGNING_ENABLED: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_API_KEY_BASE64 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_TEAM_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Validate release version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "${{ needs.prepare.outputs.release_version }}" ]; then
            echo "Expected package.json version ${{ needs.prepare.outputs.release_version }}, found $PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate ASR replay benchmark summary
        run: npm run replay:asr -- --output tmp/asr-replay.json

      - name: Verify ASR replay benchmark summary
        run: npm run verify:asr-benchmarks

      - name: Install ffmpeg-static for target architecture
        if: matrix.arch == 'x64'
        run: npm_config_arch=x64 node node_modules/ffmpeg-static/install.js

      - name: Cache native binaries
        uses: actions/cache@v4
        with:
          path: resources/bin
          key: macos-${{ matrix.arch }}-bin-${{ hashFiles('scripts/download-*.js', 'scripts/build-globe-listener.js', 'resources/macos-globe-listener.swift', 'scripts/build-macos-fast-paste.js', 'resources/macos-fast-paste.swift') }}

      - name: Download whisper.cpp binaries
        run: node scripts/download-whisper-cpp.js --current --platform darwin --arch ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download llama-server binaries
        run: node scripts/download-llama-server.js --current --platform darwin --arch ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Download sherpa-onnx binaries
        run: node scripts/download-sherpa-onnx.js --current --platform darwin --arch ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: macos-${{ matrix.arch }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: macos-${{ matrix.arch }}-electron-

      - name: Setup macOS Code Signing
        if: env.APPLE_SIGNING_ENABLED == 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          API_KEY_PATH=$RUNNER_TEMP/api_key.p8
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > $API_KEY_PATH

          security create-keychain -p "runner" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "runner" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: -s -k "runner" $KEYCHAIN_PATH

          echo "APPLE_API_KEY=$API_KEY_PATH" >> $GITHUB_ENV

      - name: Build Application (${{ matrix.arch }})
        run: npm run build:mac -- --${{ matrix.arch }} --publish always
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL }}
          VITE_OPENWHISPR_API_URL: ${{ vars.VITE_OPENWHISPR_API_URL }}
          VITE_OPENWHISPR_OAUTH_CALLBACK_URL: ${{ vars.VITE_OPENWHISPR_OAUTH_CALLBACK_URL }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.APPLE_SIGNING_ENABLED == 'true' && 'true' || 'false' }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload arch-specific update metadata
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          cp dist/latest-mac.yml "dist/latest-${{ matrix.arch }}-mac.yml"
          gh release upload "${{ needs.prepare.outputs.release_tag }}" "dist/latest-${{ matrix.arch }}-mac.yml" --clobber

      - name: Cleanup Certificates
        if: always() && env.APPLE_SIGNING_ENABLED == 'true'
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/build_certificate.p12
          rm -f $RUNNER_TEMP/api_key.p8

  finalize-update-metadata:
    needs:
      - prepare
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download published update metadata
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          mkdir -p tmp/release-assets
          gh release download "${{ needs.prepare.outputs.release_tag }}" \
            -D tmp/release-assets \
            -p "latest.yml" \
            -p "latest-linux.yml" \
            -p "latest-arm64-mac.yml" \
            -p "latest-x64-mac.yml"

      - name: Merge mac update metadata
        run: |
          node scripts/merge-mac-update-metadata.mjs \
            --x64 tmp/release-assets/latest-x64-mac.yml \
            --arm64 tmp/release-assets/latest-arm64-mac.yml \
            --output tmp/release-assets/latest-mac.yml

      - name: Upload merged mac update metadata
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          gh release upload "${{ needs.prepare.outputs.release_tag }}" tmp/release-assets/latest-mac.yml --clobber

      - name: Collect release asset manifest
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          gh api "repos/${{ github.repository }}/releases/tags/${{ needs.prepare.outputs.release_tag }}" > tmp/release-assets/release.json

      - name: Validate release assets
        run: |
          node scripts/validate-release-assets.mjs \
            --release-json tmp/release-assets/release.json \
            --latest-windows tmp/release-assets/latest.yml \
            --latest-linux tmp/release-assets/latest-linux.yml \
            --latest-mac tmp/release-assets/latest-mac.yml \
            --latest-arm64 tmp/release-assets/latest-arm64-mac.yml \
            --latest-x64 tmp/release-assets/latest-x64-mac.yml

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GH_TOKEN }}
          TAP_REPOSITORY: NotWizard/homebrew-mouthpiece
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN or GH_TOKEN with contents write access to ${TAP_REPOSITORY}."
            exit 1
          fi

          node scripts/update-homebrew-cask.mjs \
            --release-json tmp/release-assets/release.json \
            --version "$RELEASE_VERSION" \
            --output tmp/release-assets/mouthpiece.rb

          git clone "https://github.com/${TAP_REPOSITORY}.git" tmp/homebrew-mouthpiece
          mkdir -p tmp/homebrew-mouthpiece/Casks
          cp tmp/release-assets/mouthpiece.rb tmp/homebrew-mouthpiece/Casks/mouthpiece.rb

          cd tmp/homebrew-mouthpiece
          if git diff --quiet -- Casks/mouthpiece.rb; then
            echo "Homebrew tap is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/mouthpiece.rb
          git commit -F - <<MESSAGE
          更新 Mouthpiece Homebrew cask 至 ${RELEASE_VERSION} / Update Mouthpiece Homebrew cask to ${RELEASE_VERSION}

          中文：
          将 Mouthpiece Homebrew cask 更新到 ${RELEASE_VERSION}。
          此提交由 Mouthpiece release workflow 自动生成，包含 macOS arm64 与 Intel DMG 的 GitHub release SHA-256 digest。

          English:
          Update the Mouthpiece Homebrew cask to ${RELEASE_VERSION}.
          This commit was generated by the Mouthpiece release workflow and includes the GitHub release SHA-256 digests for the macOS arm64 and Intel DMG assets.
          MESSAGE
          git push "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${TAP_REPOSITORY}.git" HEAD:main
